<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Registro</title>
</head>

<body>

    <header>
        <h1>Cadastro de Usuário</h1>
    </header>

    <main class="login-container">

        <section>
            <h2>Crie sua conta</h2>

            <form action="./about.html" method="get" onsubmit="return validarFormularioRegister()">

                <div>
                    <label for="nome">Nome:</label><br>
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="email">E-mail:</label><br>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="senha">Senha:</label><br>
                    <input 
                        type="password" 
                        id="senha" 
                        name="senha" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="confirmar">Confirmar Senha:</label><br>
                    <input 
                        type="password" 
                        id="confirmar" 
                        name="confirmar" 
                        required
                    >
                </div>

                <br>

                <button type="submit">
                    Registrar
                </button>

            </form>
        </section>
        <br>
        <button class="btn-acessibilidade" onclick="DarkMode()">Dark Mode</button>
        <button class="btn-acessibilidade" onclick="aumentarFonte()">Aumentar Fonte</button>
        <button class="btn-acessibilidade" onclick="diminuirFonte()">Diminuir Fonte</button>
    </main>

    <footer>
        <p>© 2026 - Sistema de Registro, Criado por José Eduardo Zanette</p>
    </footer>

<script src="../js/functions.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Login</title>
</head>

<body>

    <header>
        <h1>Login</h1>
    </header>

    <main class="login-container">

        <section>

            <form action="./pages/about.html" method="get" onsubmit="return validarFormulario()">

                <div>
                    <label for="inputEmail">Email</label><br>

                    <input 
                        type="email"
                        id="inputEmail"
                        name="inputEmail"
                        placeholder="Digite seu email"
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="inputSenha">Senha</label><br>

                    <input 
                        type="password"
                        id="inputSenha"
                        name="inputSenha"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <br>

                <button type="submit">
                    Entrar
                </button>

            </form>

        </section>

        <br>

        <section>
            <p>
                Não possui conta?
                <a href="./pages/register.html">Registrar</a>
            </p>
        </section>
        <button class="btn-acessibilidade" onclick="DarkMode()">Dark Mode</button>
        <button class="btn-acessibilidade" onclick="aumentarFonte()">Aumentar Fonte</button>
        <button class="btn-acessibilidade" onclick="diminuirFonte()">Diminuir Fonte</button>
    </main>

    <footer>
        <p>© 2026 - Sistema de Login</p>
    </footer>


<script src="js/functions.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Contato</title>
</head>

<body>

    <header class="zblog_header">
        <h1>Contato</h1>
        
        <div class="controles">
            <button onclick="DarkMode()">Dark Mode</button>
            <button onclick="aumentarFonte()">A+ Aumentar</button>
            <button onclick="diminuirFonte()">A- Diminuir</button>
        </div>
    </header>

    <nav class="zblog_nav">
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">Sobre Mim</a></li>
            <li><a href="./curriculum.html">Currículo</a></li>
            <li><a href="./contact.html">Contato</a></li>
            <li><a href="./receitas.html">Receitas</a></li>
        </ul>
    </nav>

    <main class="login-container">

        <section aria-labelledby="titulo-contato">

            <h2 id="titulo-contato" hidden>
                Formulário de Contato
            </h2>

            <form onsubmit="return validarFormularioContact()">

                <div>
                    <label for="nome">Nome</label><br>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Digite seu nome"
                        required>
                </div>

                <br>

                <div>
                    <label for="email">E-mail</label><br>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required>
                </div>

                <br>

                <div>
                    <label for="telefone">Telefone</label><br>
                    <input
                        type="tel"
                        id="telefone"
                        name="telefone"
                        placeholder="Digite seu telefone"
                        required
                        pattern="[0-9]+"
                        title="Digite apenas números"
                        inputmode="numeric"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">

                    <small>Apenas números.</small>
                </div>

                <br>

                <div>
                    <label for="assunto">Assunto</label><br>
                    <input
                        type="text"
                        id="assunto"
                        name="assunto"
                        placeholder="Digite o assunto"
                        required>
                </div>

                <br>

                <div>
                    <label for="mensagem">Mensagem</label><br>
                    <textarea
                        id="mensagem"
                        name="mensagem"
                        rows="5"
                        placeholder="Digite sua mensagem"
                        required></textarea>
                </div>

                <br>

                <button type="submit">
                    Enviar
                </button>

                <button type="reset">
                    Limpar
                </button>
            </form>

        </section>

        <br>

    </main>

    <footer>
        <p>© 2026 - Sistema de Contato, Criado por José Eduardo Zanette</p>
    </footer>

    <script src="./js/functions.js"></script>

</body>

</html>
